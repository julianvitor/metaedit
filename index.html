<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metadata Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-gray-800 p-8 rounded-xl shadow-2xl border border-gray-700">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-400">DOCX Metadata Editor</h1>
        
        <form id="uploadForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Arquivo .docx</label>
                <input type="file" id="file" accept=".docx" required
                    class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Título</label>
                <input type="text" id="title" placeholder="Coloque o cargo da vaga"
                    class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Creator</label>
                <input type="text" id="creator" placeholder="Coloque seu nome"
                    class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Keyword</label>
                <input type="text" id="keyword" placeholder="Coloque palavras da descrição da vaga"
                    class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Description</label>
                <input type="text" id="description" placeholder="Resuma a sua experiência com base na vaga"
                    class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">Category</label>
                <input type="text" id="category" placeholder="coloque: currículo"
                    class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>

            <button type="submit" id="btnSubmit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-200">
                Processar e Baixar
            </button>
        </form>
    </div>

    <script>
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerText = "Processando...";

            const formData = new FormData();
            formData.append('file', document.getElementById('file').files[0]);
            formData.append('title', document.getElementById('title').value);
            formData.append('creator', document.getElementById('creator').value);
            formData.append('keyword', document.getElementById('keyword').value);
            formData.append('description', document.getElementById('description').value);
            formData.append('category', document.getElementById('category').value);
            


            try {
                const baseURL = window.location.hostname === "127.0.0.1" || window.location.hostname === "localhost"
                    ? "http://127.0.0.1:8000"  // dev local
                    : "";  // EC2 via Nginx (mesmo host)
                const response = await fetch(`${baseURL}/metaedit/edit-metadata/`, { method: 'POST', body: formData });
                
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = "editado.docx";
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                } else {
                    alert("Erro ao processar o arquivo.");
                }
            } catch (err) {
                console.error(err);
                alert("Erro ao conectar com o servidor");
            } finally {
                btn.disabled = false;
                btn.innerText = "Processar e Baixar";
            }
        };
    </script>
</body>
</html>
